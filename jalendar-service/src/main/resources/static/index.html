<!DOCTYPE html>
<html>
<body>

<h2>Register</h2>
<form id="registerForm">
    Email: <input type="text" id="email"><br>
    Password: <input type="password" id="password"><br>
    <button type="submit">Register</button>
</form>

<h2>Login</h2>
<form id="loginForm">
    Email: <input type="text" id="loginEmail"><br>
    Password: <input type="password" id="loginPassword"><br>
    <button type="submit">Login</button>
</form>

<button onclick="logout()">Logout</button>

<p id="currentUser"></p>

<h2>Create Task</h2>
<form id="taskForm">
    Title: <input type="text" id="title"><br>
    Description: <input type="text" id="description"><br>
    <button type="submit">Create Task</button>
</form>

<h2>Tasks</h2>
<ul id="taskList"></ul>

<script>
document.getElementById("registerForm").onsubmit = async (e) => {
    e.preventDefault();

    const res = await fetch("/api/users/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"}, 
        body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    });

    if (res.ok) {
        const user = await res.json();

        localStorage.setItem("userID", user.id);

        loadTasks();
        updateCurrentUser();

        alert("User registered with ID: " + user.id);
    } else {
        alert("Error");
    }
};

document.getElementById("loginForm").onsubmit = async (e) => {
    e.preventDefault();

    const res = await fetch("/api/users/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"}, 
        body: JSON.stringify({
            email: document.getElementById("loginEmail").value,
            password: document.getElementById("loginPassword").value
        })
    });

    if (res.ok) {
        const user = await res.json();

        localStorage.setItem("userID", user.id);

        loadTasks();
        updateCurrentUser();

        alert("Logged in as user: " + user.id);
    } else {
        alert("Login failed!");
    }
};

document.getElementById("taskForm").onsubmit = async (e) => {
    e.preventDefault();

    const userID = localStorage.getItem("userID");

    if(!userID) {
        alert("Please register or login first!");
        return;
    }

    const res = await fetch(`/api/tasks?userID=${userID}`, {
        method: "POST",
        headers: {"Content-Type": "application/json"}, 
        body: JSON.stringify({
            title: document.getElementById("title").value,
            description: document.getElementById("description").value
        })
    });

    loadTasks();
};

async function loadTasks() {
    const userID = localStorage.getItem("userID");

    if(!userID) {
        document.getElementById("taskList").innerHTML = "";
        return;
    }

    const res = await fetch(`/api/tasks?userID=${userID}`);
    const tasks = await res.json();

    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach(task => {
        const li = document.createElement("li");
        li.textContent = task.title + " - " + task.description;
        list.appendChild(li);
    });
}

function logout() {
    localStorage.removeItem("userID");
    updateCurrentUser();
    alert("Logged out successfully!");
    location.reload();
}

function updateCurrentUser() {
    const userID = localStorage.getItem("userID");
    const display = document.getElementById("currentUser");

    if(userID) {
        display.textContent = "Logged in as user: " + userID;
    } else {
        display.textContent = "Not currently logged in!";
    }
}

window.onload = () => {
    updateCurrentUser();

    if(localStorage.getItem("userID")) {
        loadTasks();
    }
}
</script>

</body>
</html>
